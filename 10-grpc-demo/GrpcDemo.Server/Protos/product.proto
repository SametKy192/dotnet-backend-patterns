syntax = "proto3";

option csharp_namespace = "GrpcDemo.Server";

package product;

// Ürün servisi — gRPC endpoint tanımları
// Bu dosyadan C# kodu otomatik üretilir
service ProductService {
  // Unary call — tek istek, tek cevap (REST gibi)
  rpc GetProduct (GetProductRequest) returns (ProductResponse);

  // Server streaming — tek istek, çok cevap
  rpc GetAllProducts (GetAllProductsRequest) returns (stream ProductResponse);
}

message GetProductRequest {
  int32 id = 1;
}

message GetAllProductsRequest {}

message ProductResponse {
  int32 id = 1;
  string name = 2;
  double price = 3;
}